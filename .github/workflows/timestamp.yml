name: OpenTimestamps Auto-Stamp

on:
  push:
    branches: [ main ]

# 🔑 Grant write permissions so the action can push the timestamp file
permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install OpenTimestamps
        run: pip install opentimestamps-client

      - name: Stamp the Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stamp the README (or any other core file)
          ots stamp README.md

          # Only commit and push if there are changes
          if [[ -n "$(git status --porcelain)" ]]; then
            git add *.ots
            git commit -m "⛓️ Automatically timestamped by OpenTimestamps"
            git push
          else
            echo "No new timestamp to commit."
          fi
